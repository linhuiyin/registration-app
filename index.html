<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="报名助手">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<title>报名助手 - 免费报名小程序</title>
<!-- QR code via QuickChart API, no JS library needed -->
<style>
/* ========== Reset & Variables ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #4f46e5;
  --primary-light: #6366f1;
  --primary-bg: #eef2ff;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.1),0 4px 10px rgba(0,0,0,.08);
  --transition: 200ms ease;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--gray-50);
  color: var(--gray-800);
  line-height: 1.6;
  min-height: 100vh;
}

/* ========== Layout ========== */
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; position: relative; background: #fff; box-shadow: var(--shadow-lg); }

header {
  background: linear-gradient(135deg, var(--primary), #7c3aed);
  color: #fff;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  min-height: 56px;
}
header .back-btn {
  background: rgba(255,255,255,.2);
  border: none;
  color: #fff;
  width: 36px; height: 36px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background var(--transition);
}
header .back-btn:hover { background: rgba(255,255,255,.35); }
header .back-btn:active { background: rgba(255,255,255,.5); }
header h1 { font-size: 18px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
header .header-action {
  background: rgba(255,255,255,.2);
  border: none;
  color: #fff;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: background var(--transition);
}
header .header-action:hover { background: rgba(255,255,255,.35); }

main { flex: 1; padding: 16px; overflow-y: auto; }

/* ========== Cards ========== */
.card {
  background: #fff;
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray-100);
  transition: box-shadow var(--transition), transform var(--transition);
}
.card:active { transform: scale(.995); }
.card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
.card-title { font-size: 16px; font-weight: 600; color: var(--gray-900); flex: 1; }
.card-meta { font-size: 13px; color: var(--gray-500); margin-top: 8px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
}
.badge-active { background: #d1fae5; color: #065f46; }
.badge-ended { background: var(--gray-100); color: var(--gray-500); }
.badge-count { background: var(--primary-bg); color: var(--primary); }

/* ========== Buttons ========== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 20px; border-radius: 24px; font-size: 14px; font-weight: 500;
  border: none; cursor: pointer; transition: all var(--transition);
  white-space: nowrap; text-decoration: none;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-light); }
.btn-primary:active { transform: scale(.96); }
.btn-outline { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); }
.btn-outline:hover { background: var(--primary-bg); }
.btn-danger { background: #fff; color: var(--danger); border: 1.5px solid var(--danger); }
.btn-danger:hover { background: #fef2f2; }
.btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 20px; }
.btn-block { width: 100%; justify-content: center; }
.btn:disabled { opacity: .5; pointer-events: none; }

.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* ========== Forms ========== */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 14px; font-weight: 500; color: var(--gray-700); margin-bottom: 6px; }
.form-label .required { color: var(--danger); margin-left: 2px; }
.form-input, .form-textarea, .form-select {
  width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm); font-size: 15px; font-family: inherit;
  color: var(--gray-800); background: var(--gray-50);
  transition: border-color var(--transition), box-shadow var(--transition);
  -webkit-appearance: none;
}
.form-input:focus, .form-textarea:focus, .form-select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,.1);
  background: #fff;
}
.form-textarea { min-height: 80px; resize: vertical; }
.form-input.error, .form-textarea.error { border-color: var(--danger); }
.form-error { font-size: 12px; color: var(--danger); margin-top: 4px; display: none; }
.form-input.error + .form-error { display: block; }

/* ========== QR Code ========== */
.qr-section {
  text-align: center;
  padding: 24px 0;
}
.qr-wrapper {
  display: inline-block;
  padding: 16px;
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  margin-bottom: 16px;
}
.qr-wrapper img { display: block; margin: 0 auto; }
.qr-url {
  font-size: 13px;
  color: var(--gray-500);
  word-break: break-all;
  background: var(--gray-50);
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  margin-top: 12px;
}
.qr-actions { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }

/* ========== Empty State ========== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--gray-400);
}
.empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; }
.empty-state h3 { font-size: 17px; color: var(--gray-600); margin-bottom: 8px; }
.empty-state p { font-size: 14px; margin-bottom: 20px; }

/* ========== Toast ========== */
.toast-container {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 9999; display: flex; flex-direction: column; gap: 8px;
  width: calc(100% - 32px); max-width: 440px; pointer-events: none;
}
.toast {
  padding: 12px 18px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 500; color: #fff;
  text-align: center;
  animation: toastIn .3s ease;
  pointer-events: auto;
  box-shadow: var(--shadow-lg);
}
.toast-success { background: var(--success); }
.toast-error { background: var(--danger); }
.toast-info { background: var(--primary); }
@keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

/* ========== Tab Bar ========== */
.tab-bar {
  display: flex;
  border-bottom: 2px solid var(--gray-100);
  margin-bottom: 16px;
}
.tab-bar button {
  flex: 1; padding: 10px; border: none; background: none;
  font-size: 14px; font-weight: 500; color: var(--gray-500);
  cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all var(--transition);
}
.tab-bar button.active { color: var(--primary); border-bottom-color: var(--primary); }

/* ========== Registration List ========== */
.reg-list-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--gray-100);
}
.reg-list-item:last-child { border-bottom: none; }
.reg-list-item .reg-name { font-weight: 600; font-size: 15px; }
.reg-list-item .reg-info { font-size: 13px; color: var(--gray-500); margin-top: 4px; }
.reg-list-item .reg-time { font-size: 12px; color: var(--gray-400); margin-top: 2px; }

/* ========== Search ========== */
.search-bar {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.search-bar .form-input { flex: 1; }

/* ========== Stats ========== */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-card {
  text-align: center; padding: 16px 10px;
  background: var(--gray-50); border-radius: var(--radius-sm);
}
.stat-card .stat-num { font-size: 24px; font-weight: 700; color: var(--primary); }
.stat-card .stat-label { font-size: 12px; color: var(--gray-500); margin-top: 4px; }

/* ========== Modal ========== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  padding: 20px; animation: fadeIn .2s ease;
}
.modal {
  background: #fff; border-radius: var(--radius); padding: 24px;
  width: 100%; max-width: 400px; max-height: 80vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
.modal h3 { font-size: 17px; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ========== Footer ========== */
.app-footer {
  text-align: center; padding: 20px; font-size: 12px;
  color: var(--gray-400); border-top: 1px solid var(--gray-100);
}
.app-footer a { color: var(--primary); text-decoration: none; }

/* ========== Custom Field Row ========== */
.field-row {
  display: flex; gap: 8px; align-items: center; margin-bottom: 10px;
}
.field-row .form-input { flex: 1; }
.field-row .form-select { width: 100px; flex-shrink: 0; }
.field-remove {
  background: none; border: none; color: var(--danger);
  font-size: 20px; cursor: pointer; padding: 4px; line-height: 1;
}

/* ========== Success Page ========== */
.success-page {
  text-align: center; padding: 60px 20px;
}
.success-icon {
  width: 80px; height: 80px; background: #d1fae5; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 40px; margin-bottom: 20px;
}
.success-page h2 { font-size: 22px; color: var(--gray-900); margin-bottom: 8px; }
.success-page p { color: var(--gray-500); font-size: 15px; }

/* ========== Responsive ========== */
@media (max-width: 480px) {
  .app { max-width: 100%; }
  header { padding: 12px 16px; }
  main { padding: 12px; }
  .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat-card { padding: 12px 6px; }
  .stat-card .stat-num { font-size: 20px; }
}

/* ========== Print ========== */
@media print {
  header, .btn, .tab-bar, .qr-actions, .app-footer { display: none !important; }
  body { background: #fff; }
  .app { box-shadow: none; max-width: 100%; }
}

/* ========== Highlight animation ========== */
@keyframes highlight { 0% { background: #fef3c7; } 100% { background: transparent; } }
.highlight { animation: highlight 2s ease; }
</style>
</head>
<body>

<div class="app" id="app">
  <header id="header"></header>
  <main id="main"></main>
  <div class="app-footer" id="appFooter">
    报名助手 · 免费使用 ·
    <a href="#" onclick="navigate('home')">管理活动</a>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
/* ========== 数据存储 ========== */
const STORAGE_KEY = 'registration_app_data';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { events: [], registrations: {} };
  } catch { return { events: [], registrations: {} }; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getEvents() { return loadData().events; }
function getRegistrations(eventId) { return loadData().registrations[eventId] || []; }

function saveEvent(event) {
  const data = loadData();
  const idx = data.events.findIndex(e => e.id === event.id);
  if (idx >= 0) data.events[idx] = event;
  else data.events.push(event);
  saveData(data);
}

function deleteEvent(eventId) {
  const data = loadData();
  data.events = data.events.filter(e => e.id !== eventId);
  delete data.registrations[eventId];
  saveData(data);
}

function saveRegistration(eventId, reg) {
  const data = loadData();
  if (!data.registrations[eventId]) data.registrations[eventId] = [];
  data.registrations[eventId].push(reg);
  saveData(data);
}

function deleteRegistration(eventId, regId) {
  const data = loadData();
  if (data.registrations[eventId]) {
    data.registrations[eventId] = data.registrations[eventId].filter(r => r.id !== regId);
    saveData(data);
  }
}

function generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }

/* ========== 活动数据URL编解码（跨设备共享） ========== */
// 类型缩写映射（减少URL体积）
var TYPE_MAP = { text:'t', tel:'p', email:'e', number:'n', textarea:'a', select:'s' };
var TYPE_REV = { t:'text', p:'tel', e:'email', n:'number', a:'textarea', s:'select' };

function encodeEventForUrl(event) {
  // 用数组格式压缩字段: [label, typeChar, required]
  var fields = event.fields.map(function(f) {
    return [f.label, TYPE_MAP[f.type] || 't', f.required ? 1 : 0];
  });
  var config = {
    id: event.id,
    t: event.title,
    d: event.description || '',
    f: fields,
    dl: event.deadline || '',
    mx: event.maxRegs || 0,
    st: event.status,
    ca: event.createdAt,
  };
  try {
    var json = JSON.stringify(config);
    var bytes = [];
    for (var i = 0; i < json.length; i++) {
      var c = json.charCodeAt(i);
      if (c < 128) bytes.push(c);
      else if (c < 2048) { bytes.push(192 | c >> 6); bytes.push(128 | c & 63); }
      else { bytes.push(224 | c >> 12); bytes.push(128 | c >> 6 & 63); bytes.push(128 | c & 63); }
    }
    var binary = '';
    for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  } catch(e) { return ''; }
}

function decodeEventFromUrl(encoded) {
  try {
    var b64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4) b64 += '=';
    var binary = atob(b64);
    var bytes = [];
    for (var i = 0; i < binary.length; i++) bytes.push(binary.charCodeAt(i));
    var json = '';
    var j = 0;
    while (j < bytes.length) {
      var b = bytes[j++];
      if (b < 128) json += String.fromCharCode(b);
      else if (b < 224) { json += String.fromCharCode(((b & 31) << 6) | (bytes[j++] & 63)); }
      else { json += String.fromCharCode(((b & 15) << 12) | ((bytes[j++] & 63) << 6) | (bytes[j++] & 63)); }
    }
    var cfg = JSON.parse(json);
    // 还原字段数组: [label, typeChar, required] → {key, label, type, required}
    var fields = (cfg.f || []).map(function(f, i) {
      return {
        key: 'field_' + i,
        label: f[0],
        type: TYPE_REV[f[1]] || 'text',
        required: !!f[2]
      };
    });
    return {
      id: cfg.id,
      title: cfg.t,
      description: cfg.d,
      fields: fields,
      deadline: cfg.dl || null,
      maxRegs: cfg.mx || null,
      status: cfg.st,
      createdAt: cfg.ca,
    };
  } catch(e) { return null; }
}

/* ========== Toast ========== */
function showToast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => { toast.remove(); }, 2500);
}

/* ========== 路由 ========== */
let currentRoute = null;

function getRoute() {
  const hash = location.hash.slice(1) || 'home';
  const parts = hash.split('/');
  return { page: parts[0], params: parts.slice(1) };
}

function navigate(route) {
  location.hash = '#' + route;
}

window.addEventListener('hashchange', () => { render(); });
window.addEventListener('load', () => { render(); });

/* ========== 渲染引擎 ========== */
function render() {
  const route = getRoute();
  const app = document.getElementById('app');
  const footer = document.getElementById('appFooter');

  // 在报名页和成功页隐藏底部管理入口
  if (route.page === 'register' || route.page === 'success') {
    footer.style.display = 'none';
  } else {
    footer.style.display = '';
  }

  // Update header & main based on route
  switch (route.page) {
    case 'home': renderHome(); break;
    case 'create': renderCreateForm(route.params[0]); break;
    case 'event': renderEventDetail(route.params[0]); break;
    case 'register': renderRegistrationForm(route.params[0], route.params[1]); break;
    case 'success': renderSuccessPage(); break;
    default: renderHome();
  }
}

function setHeader(title, showBack = false, actionLabel = '', actionFn = null) {
  const header = document.getElementById('header');
  header.innerHTML = `
    ${showBack
      ? `<button class="back-btn" onclick="window.history.back()" aria-label="返回">←</button>`
      : ''}
    <h1>${title}</h1>
    ${actionLabel
      ? `<button class="header-action" onclick="(${actionFn.toString()})()">${actionLabel}</button>`
      : ''}
  `;
}

function setMain(html) {
  document.getElementById('main').innerHTML = html;
}

/* ========== 首页：活动列表 ========== */
function renderHome() {
  setHeader('📋 报名助手', false, '+ 新建', () => navigate('create'));

  const events = getEvents().sort((a, b) => b.createdAt - a.createdAt);

  if (events.length === 0) {
    setMain(`
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <h3>还没有活动</h3>
        <p>创建你的第一个报名活动，生成二维码分享给参与者扫码报名</p>
        <button class="btn btn-primary btn-block" onclick="navigate('create')">✨ 创建活动</button>
      </div>
      <div style="margin-top:24px;padding:16px;background:var(--primary-bg);border-radius:var(--radius);font-size:13px;color:var(--gray-600);line-height:1.8;">
        <strong>💡 使用说明：</strong><br>
        1️⃣ 点击「新建活动」创建报名活动<br>
        2️⃣ 设置报名字段（姓名、手机号等）<br>
        3️⃣ 生成二维码，分享给参与者<br>
        4️⃣ 参与者用微信扫码即可报名<br>
        5️⃣ 在活动详情中查看/导出报名数据
      </div>
    `);
    return;
  }

  let html = '';
  events.forEach(event => {
    const regs = getRegistrations(event.id);
    const isActive = !event.deadline || new Date(event.deadline) > new Date();
    const isOpen = event.status === 'open';
    html += `
      <div class="card" onclick="navigate('event/${event.id}')" style="cursor:pointer;">
        <div class="card-header">
          <div class="card-title">${escHtml(event.title)}</div>
          <span class="badge ${isActive && isOpen ? 'badge-active' : 'badge-ended'}">
            ${isOpen ? (isActive ? '进行中' : '已截止') : '已关闭'}
          </span>
        </div>
        ${event.description ? `<p style="font-size:14px;color:var(--gray-500);margin-bottom:8px;">${escHtml(event.description)}</p>` : ''}
        <div class="card-meta">
          <span>👥 ${regs.length} 人报名</span>
          ${event.deadline ? `<span>⏰ 截止：${formatDate(event.deadline)}</span>` : ''}
          <span>📅 ${formatDate(event.createdAt)} 创建</span>
        </div>
      </div>
    `;
  });

  setMain(html);
}

/* ========== 创建/编辑活动 ========== */
function renderCreateForm(editId) {
  const isEdit = !!editId;
  const data = loadData();
  const event = isEdit ? data.events.find(e => e.id === editId) : null;

  setHeader(isEdit ? '✏️ 编辑活动' : '✨ 新建活动', true);

  if (isEdit && !event) {
    setMain('<div class="empty-state"><h3>活动不存在</h3><button class="btn btn-primary" onclick="navigate(\'home\')">返回首页</button></div>');
    return;
  }

  const fields = event ? event.fields : [
    { key: 'name', label: '姓名', type: 'text', required: true },
    { key: 'phone', label: '手机号', type: 'tel', required: true },
    { key: 'company', label: '单位/学校', type: 'text', required: false },
    { key: 'note', label: '备注', type: 'textarea', required: false },
  ];

  setMain(`
    <form id="eventForm" onsubmit="submitEvent(event, '${isEdit ? editId : ''}')">
      <div class="form-group">
        <label class="form-label"><span class="required">*</span> 活动标题</label>
        <input class="form-input" name="title" required placeholder="例如：2024年会报名" value="${event ? escAttr(event.title) : ''}">
      </div>

      <div class="form-group">
        <label class="form-label">活动描述</label>
        <textarea class="form-textarea" name="description" rows="2" placeholder="简单描述活动内容...">${event ? escHtml(event.description || '') : ''}</textarea>
      </div>

      <div class="form-group">
        <label class="form-label">报名截止日期</label>
        <input class="form-input" type="datetime-local" name="deadline" value="${event && event.deadline ? event.deadline : ''}">
      </div>

      <div class="form-group">
        <label class="form-label">报名上限（空=不限）</label>
        <input class="form-input" type="number" name="maxRegs" min="1" placeholder="不填表示不限人数" value="${event ? (event.maxRegs || '') : ''}">
      </div>

      <div class="form-group">
        <label class="form-label">报名字段设置</label>
        <div id="fieldsContainer">
          ${fields.map((f, i) => `
            <div class="field-row" data-index="${i}">
              <input class="form-input" placeholder="字段名（如：姓名）" value="${escAttr(f.label)}" data-field="label">
              <select class="form-select" data-field="type">
                <option value="text" ${f.type === 'text' ? 'selected' : ''}>文本</option>
                <option value="tel" ${f.type === 'tel' ? 'selected' : ''}>电话</option>
                <option value="email" ${f.type === 'email' ? 'selected' : ''}>邮箱</option>
                <option value="number" ${f.type === 'number' ? 'selected' : ''}>数字</option>
                <option value="textarea" ${f.type === 'textarea' ? 'selected' : ''}>多行</option>
                <option value="select" ${f.type === 'select' ? 'selected' : ''}>选择</option>
              </select>
              <label style="display:flex;align-items:center;gap:2px;font-size:12px;white-space:nowrap;">
                <input type="checkbox" data-field="required" ${f.required ? 'checked' : ''}> 必填
              </label>
              ${fields.length > 1 ? `<button type="button" class="field-remove" onclick="removeField(this)" title="删除">×</button>` : ''}
            </div>
          `).join('')}
        </div>
        <button type="button" class="btn btn-outline btn-sm" onclick="addField()" style="margin-top:8px;">+ 添加字段</button>
      </div>

      <div class="btn-group" style="margin-top:20px;">
        <button type="submit" class="btn btn-primary btn-block">
          ${isEdit ? '💾 保存修改' : '✨ 创建活动'}
        </button>
      </div>
    </form>
  `);
}

function addField() {
  const container = document.getElementById('fieldsContainer');
  const idx = container.children.length;
  const row = document.createElement('div');
  row.className = 'field-row';
  row.setAttribute('data-index', idx);
  row.innerHTML = `
    <input class="form-input" placeholder="字段名（如：性别）" data-field="label" value="">
    <select class="form-select" data-field="type">
      <option value="text">文本</option>
      <option value="tel">电话</option>
      <option value="email">邮箱</option>
      <option value="number">数字</option>
      <option value="textarea">多行</option>
      <option value="select">选择</option>
    </select>
    <label style="display:flex;align-items:center;gap:2px;font-size:12px;white-space:nowrap;">
      <input type="checkbox" data-field="required"> 必填
    </label>
    <button type="button" class="field-remove" onclick="removeField(this)" title="删除">×</button>
  `;
  container.appendChild(row);
}

function removeField(btn) {
  const container = document.getElementById('fieldsContainer');
  if (container.children.length <= 1) {
    showToast('至少保留一个字段', 'error');
    return;
  }
  btn.closest('.field-row').remove();
}

function collectFields() {
  const rows = document.querySelectorAll('#fieldsContainer .field-row');
  const fields = [];
  rows.forEach(row => {
    const label = row.querySelector('[data-field="label"]').value.trim();
    if (!label) return;
    fields.push({
      key: 'field_' + fields.length,
      label: label,
      type: row.querySelector('[data-field="type"]').value,
      required: row.querySelector('[data-field="required"]').checked
    });
  });
  return fields;
}

function submitEvent(e, editId) {
  e.preventDefault();
  const form = document.getElementById('eventForm');
  const formData = new FormData(form);
  const fields = collectFields();

  if (fields.length === 0) {
    showToast('请至少设置一个报名字段', 'error');
    return;
  }

  const event = {
    id: editId || generateId(),
    title: formData.get('title').trim(),
    description: formData.get('description').trim(),
    deadline: formData.get('deadline') || null,
    maxRegs: formData.get('maxRegs') ? parseInt(formData.get('maxRegs')) : null,
    fields: fields,
    status: 'open',
    createdAt: editId ? (loadData().events.find(ev => ev.id === editId)?.createdAt || Date.now()) : Date.now(),
    updatedAt: Date.now(),
  };

  saveEvent(event);
  showToast(editId ? '活动已更新！' : '活动创建成功！🎉', 'success');
  navigate('event/' + event.id);
}

/* ========== 活动详情 ========== */
function renderEventDetail(eventId) {
  const data = loadData();
  const event = data.events.find(e => e.id === eventId);

  if (!event) {
    setHeader('活动不存在', true);
    setMain('<div class="empty-state"><h3>活动不存在或已删除</h3><button class="btn btn-primary" onclick="navigate(\'home\')">返回首页</button></div>');

  }

  setHeader(event.title, true, '⚙️', () => navigate('create/' + event.id));

  var qrHtml = `
    <div class="qr-section">
      <div class="qr-wrapper">
        <img src="${qrImgSrc}" alt="报名二维码" style="display:block;width:220px;height:220px;" onerror="this.outerHTML='<p style=color:red>二维码加载失败</p>'">
      </div>
      <p style="font-size:14px;color:var(--gray-600);margin-bottom:8px;">
        📱 用微信或其他扫码软件扫描二维码报名
      </p>
      <div class="qr-url">${regUrl}</div>
      <div class="qr-actions">
        <button class="btn btn-primary btn-sm" onclick="copyUrl('${regUrl}')">📋 复制链接</button>
        <button class="btn btn-outline btn-sm" onclick="shareUrl('${regUrl}', '${escAttr(event.title)}')">📤 分享</button>
      </div>
      <div style="margin-top:16px;font-size:13px;color:var(--gray-500);">
        ${event.status === 'open'
          ? (event.deadline ? '⏰ 报名截止：' + formatDate(event.deadline) : '🟢 活动进行中，接受报名')

        <button class="btn btn-outline btn-sm" onclick="toggleEventStatus('${event.id}')">
          ${event.status === 'open' ? '⏸️ 关闭报名' : '▶️ 开启报名'}
        </button>
        <button class="btn btn-danger btn-sm" onclick="confirmDeleteEvent('${event.id}')">🗑️ 删除活动</button>
      </div>
    </div>
  `;

  let html = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num">${regs.length}</div>
        <div class="stat-label">已报名</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${event.maxRegs || '∞'}</div>
        <div class="stat-label">名额上限</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${event.status === 'open' ? '✅' : '⛔'}</div>
        <div class="stat-label">${event.status === 'open' ? '开放中' : '已关闭'}</div>
      </div>
    </div>

    <div class="tab-bar" id="detailTabs">
      <button class="active" onclick="switchTabContent('qr', '${event.id}', this)">📱 报名码</button>
      <button onclick="switchTabContent('list', '${event.id}', this)">👥 报名列表</button>

    <div id="detailContent">

function switchTabContent(tab, eventId, btnEl) {
  document.querySelectorAll('#detailTabs button').forEach(function(b) { b.classList.remove('active'); });
  if (btnEl) btnEl.classList.add('active');

  var content = document.getElementById('detailContent');
  if (!content) return;

  if (tab === 'qr') {
    var d = loadData();
    var ev = d.events.find(function(e) { return e.id === eventId; });
    if (!ev) return;
    var encoded = encodeEventForUrl(ev);
    var regUrl = location.origin + location.pathname + '#register/' + eventId + '/' + encoded;
    var qrImgSrc = 'https://quickchart.io/qr?text=' + encodeURIComponent(regUrl) + '&size=280';

    content.innerHTML = `
      <div class="qr-section">
        <div class="qr-wrapper">
          <img src="${qrImgSrc}" alt="报名二维码" style="display:block;width:220px;height:220px;" onerror="this.outerHTML='<p style=color:red>二维码加载失败</p>'">
        </div>
        <p style="font-size:14px;color:var(--gray-600);margin-bottom:8px;">
          📱 用微信或其他扫码软件扫描二维码报名
        </p>
        <div class="qr-url">${regUrl}</div>
        <div class="qr-actions">
          <button class="btn btn-primary btn-sm" onclick="copyUrl('${regUrl}')">📋 复制链接</button>
          <button class="btn btn-outline btn-sm" onclick="shareUrl('${regUrl}', '${escAttr(ev.title)}')">📤 分享</button>
        </div>
        <div style="margin-top:16px;font-size:13px;color:var(--gray-500);">
          ${ev.status === 'open'
            ? (ev.deadline ? '⏰ 报名截止：' + formatDate(ev.deadline) : '🟢 活动进行中，接受报名')
            : '🔴 活动已关闭，不接受新报名'}
          ${ev.maxRegs ? ' · 限额 ' + ev.maxRegs + ' 人' : ''}
        </div>
        <div class="btn-group" style="margin-top:20px;justify-content:center;">
          <button class="btn btn-outline btn-sm" onclick="toggleEventStatus('${ev.id}')">
            ${ev.status === 'open' ? '⏸️ 关闭报名' : '▶️ 开启报名'}
          </button>
          <button class="btn btn-danger btn-sm" onclick="confirmDeleteEvent('${ev.id}')">🗑️ 删除活动</button>
        </div>
      </div>

  } else {
    renderListTabContent(eventId, content);

}

function renderListTabContent(eventId, container) {
  var regs = getRegistrations(eventId);
  var d = loadData();
  var ev = d.events.find(function(e) { return e.id === eventId; });

  if (regs.length === 0) {
    container.innerHTML = '<div class="empty-state" style="padding:40px;"><div class="empty-icon">📭</div><h3>暂无报名记录</h3><p>分享二维码或链接给参与者报名吧</p></div>';
    return;
  }

  var html = `
    <div class="search-bar">
      <input class="form-input" id="searchReg" placeholder="🔍 搜索报名记录..." oninput="filterRegs('${eventId}')">
      <button class="btn btn-outline btn-sm" onclick="exportCSV('${eventId}')">📥 导出</button>
    </div>
    <div id="regList">
  `;

  regs.slice().reverse().forEach(function(reg, i) {
    html += `
      <div class="reg-list-item" data-search="${escAttr(JSON.stringify(reg.fields).toLowerCase())}">
        <div style="display:flex;justify-content:space-between;align-items:start;">
          <div style="flex:1;">
            <div class="reg-name">#${regs.length - i} ${escHtml(reg.fields[Object.keys(reg.fields)[0]] || '—')}</div>
            <div class="reg-info">${formatRegInfo(reg.fields, ev.fields)}</div>
            <div class="reg-time">📅 ${formatDateTime(reg.createdAt)}</div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();removeRegItem('${eventId}','${reg.id}')" style="flex-shrink:0;">删除</button>
        </div>
      </div>
    `;
  });

  html += '</div>';
  container.innerHTML = html;
}

function removeRegItem(eventId, regId) {
  if (!confirm('确定要删除这条报名记录吗？此操作不可恢复。')) return;
  deleteRegistration(eventId, regId);
  var c = document.getElementById('detailContent');
  if (c) renderListTabContent(eventId, c);
}

function formatRegInfo(fields, eventFields) {
  const entries = Object.entries(fields).slice(1, 4); // skip first (usually name), show up to 3 more
  return entries.map(([k, v]) => {
    const fieldDef = eventFields.find(f => f.key === k);
    return `${fieldDef?.label || k}: ${v || '—'}`;
  }).join(' · ');
}

function filterRegs(eventId) {
  const query = document.getElementById('searchReg').value.toLowerCase();
  document.querySelectorAll('#regList .reg-list-item').forEach(item => {
    const searchData = item.getAttribute('data-search') || '';
    item.style.display = searchData.includes(query) ? '' : 'none';
  });
}

/* ========== 报名表单（用户端） ========== */
function renderRegistrationForm(eventId, encodedData) {
  var data = loadData();
  var event = data.events.find(function(e) { return e.id === eventId; });

  // 本地没有活动数据，尝试从URL解码（跨设备扫码场景）
  if (!event && encodedData) {
    var decoded = decodeEventFromUrl(encodedData);
    if (decoded && decoded.id === eventId) {
      // 将活动配置写入本地存储，这样报名数据可以保存
      event = decoded;
      event.updatedAt = Date.now();
      if (!data.events.find(function(e) { return e.id === eventId; })) {
        data.events.push(event);
        saveData(data);
      }
    }
  }

  if (!event) {
    setHeader('活动不存在', false);
    setMain(`
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <h3>活动不存在或已结束</h3>
        <p>请联系活动主办方获取最新链接</p>
      </div>
    `);
    return;
  }

  const regs = getRegistrations(event.id);
  const isFull = event.maxRegs && regs.length >= event.maxRegs;
  const isExpired = event.deadline && new Date(event.deadline) < new Date();
  const isClosed = event.status !== 'open';

  setHeader(`📝 ${event.title}`, false);

  if (isClosed || isExpired || isFull) {
    let reason = '';
    if (isClosed) reason = '活动已关闭报名';
    else if (isExpired) reason = '报名已截止';
    else if (isFull) reason = '报名名额已满';

    setMain(`
      <div class="empty-state">
        <div class="empty-icon">⛔</div>
        <h3>${reason}</h3>
        <p>${event.description || '感谢关注！'}</p>
        ${event.deadline ? `<p style="font-size:13px;color:var(--gray-400);">截止时间：${formatDateTime(event.deadline)}</p>` : ''}
      </div>
    `);
    return;
  }

  setMain(`
    <div class="card">
      <h3 style="font-size:18px;margin-bottom:4px;">📝 ${escHtml(event.title)}</h3>
      ${event.description ? `<p style="font-size:14px;color:var(--gray-500);margin-bottom:16px;">${escHtml(event.description)}</p>` : ''}

      <form id="regForm" onsubmit="submitRegistration(event, '${eventId}')">
        ${event.fields.map(f => `
          <div class="form-group">
            <label class="form-label">
              ${f.label}
              ${f.required ? '<span class="required">*</span>' : ''}
            </label>
            ${f.type === 'textarea'
              ? `<textarea class="form-textarea" name="${f.key}" ${f.required ? 'required' : ''} placeholder="请输入${f.label}"></textarea>`
              : f.type === 'select'
                ? `<select class="form-select" name="${f.key}" ${f.required ? 'required' : ''}>
                    <option value="">请选择${f.label}</option>
                    <option value="选项1">选项1</option>
                    <option value="选项2">选项2</option>
                    <option value="选项3">选项3</option>
                  </select>`
              : `<input class="form-input" type="${f.type}" name="${f.key}" ${f.required ? 'required' : ''} placeholder="请输入${f.label}">`
            }
          </div>
        `).join('')}

        <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">
          ✅ 提交报名
        </button>
      </form>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--gray-400);margin-top:8px;">
      已报名 ${regs.length}${event.maxRegs ? '/' + event.maxRegs : ''} 人 · 数据仅活动主办方可查看
    </p>
  `);
}

function submitRegistration(e, eventId) {
  e.preventDefault();
  const form = document.getElementById('regForm');
  const formData = new FormData(form);
  const data = loadData();
  const event = data.events.find(ev => ev.id === eventId);

  if (!event || event.status !== 'open') {
    showToast('活动已关闭，无法报名', 'error');
    return;
  }

  // Check deadline
  if (event.deadline && new Date(event.deadline) < new Date()) {
    showToast('报名已截止', 'error');
    return;
  }

  // Check max
  const regs = getRegistrations(event.id);
  if (event.maxRegs && regs.length >= event.maxRegs) {
    showToast('名额已满', 'error');
    return;
  }

  const fields = {};
  event.fields.forEach(f => {
    if (f.required && !formData.get(f.key)) {
      // Will be caught by HTML5 validation
    }
    fields[f.key] = formData.get(f.key) || '';
  });

  const reg = {
    id: generateId(),
    fields: fields,
    createdAt: Date.now(),
  };

  saveRegistration(eventId, reg);
  navigate('success');
}

/* ========== 报名成功页 ========== */
function renderSuccessPage() {
  setHeader('报名成功', false);
  setMain(`
    <div class="success-page">
      <div class="success-icon">✅</div>
      <h2>报名成功！</h2>
      <p>您的报名信息已提交</p>
      <p style="font-size:13px;color:var(--gray-400);margin-top:8px;">可关闭此页面</p>
    </div>
  `);
}

/* ========== 工具函数 ========== */
function escHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escAttr(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatDate(ts) {
  const d = new Date(typeof ts === 'string' ? ts : Number(ts));
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateTime(ts) {
  const d = new Date(typeof ts === 'string' ? ts : Number(ts));
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function copyUrl(url) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('链接已复制！', 'success'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('链接已复制！', 'success');
  }
}

function shareUrl(url, title) {
  if (navigator.share) {
    navigator.share({ title: title, url: url }).catch(() => {});
  } else {
    copyUrl(url);
  }
}

function exportCSV(eventId) {
  const data = loadData();
  const event = data.events.find(e => e.id === eventId);
  const regs = getRegistrations(eventId);

  if (regs.length === 0) {
    showToast('没有数据可导出', 'error');
    return;
  }

  // Build CSV
  const headers = event.fields.map(f => f.label);
  const keys = event.fields.map(f => f.key);

  let csv = '﻿'; // BOM for Excel Chinese support
  csv += headers.join(',') + '\n';

  regs.forEach(reg => {
    const row = keys.map(k => {
      let v = (reg.fields[k] || '').replace(/"/g, '""');
      return `"${v}"`;
    });
    csv += row.join(',') + '\n';
  });

  // Download
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${event.title}_报名数据_${formatDate(Date.now())}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast(`已导出 ${regs.length} 条记录`, 'success');
}

/* ========== 移除活动展示的函数暴露到全局 ========== */
// Functions already defined above and accessible via onclick handlers
// The renderListTabContent & renderEventDetail functions handle the list display

function toggleEventStatus(eventId) {
  const data = loadData();
  const event = data.events.find(e => e.id === eventId);
  if (!event) return;
  event.status = event.status === 'open' ? 'closed' : 'open';
  event.updatedAt = Date.now();
  saveData(data);
  showToast(event.status === 'open' ? '活动已开启报名' : '活动已关闭报名', 'success');
  renderEventDetail(eventId);
}

function confirmDeleteEvent(eventId) {
  const data = loadData();
  const event = data.events.find(e => e.id === eventId);
  if (!event) return;
  const regs = getRegistrations(eventId);
  const msg = regs.length > 0
    ? `确定要删除「${event.title}」吗？\n\n将同时删除 ${regs.length} 条报名记录，此操作不可恢复！`
    : `确定要删除「${event.title}」吗？`;
  if (!confirm(msg)) return;
  deleteEvent(eventId);
  showToast('活动已删除', 'info');
  navigate('home');
}
